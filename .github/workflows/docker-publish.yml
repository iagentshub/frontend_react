name: Verify and publish frontend

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck
      - run: npm run lint
      - run: npm run test
      - run: npm run build
      - run: npx playwright install --with-deps chromium
      - run: npm run test:e2e:chromium

  publish:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}
      - id: meta
        uses: docker/metadata-action@v5
        with:
          images: iagenthub/frontend
          tags: |
            type=sha,prefix=sha-
            type=ref,event=tag
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=react,enable={{is_default_branch}}
      - uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # Imagen unificada (backend + frontend en un solo contenedor) usada por
  # install.sh / docker-compose.hub.yml — publica el tag `:latest` (variante
  # React; ver frontend_vanilla/.github/workflows/docker-publish.yml para `:vanilla`).
  publish-unified:
    if: github.event_name != 'pull_request'
    needs: verify
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Checkout iagentshub (Dockerfile + scripts)
        uses: actions/checkout@v4
        with:
          repository: iagentshub/iAgents
          path: iagentshub

      - name: Checkout backend
        uses: actions/checkout@v4
        with:
          repository: iagentshub/backend_fastapi
          path: backend

      - name: Checkout frontend
        uses: actions/checkout@v4
        with:
          path: frontend

      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Preparar contexto de build
        run: |
          mkdir -p build-ctx
          cp -r backend/  build-ctx/backend
          cp -r frontend/ build-ctx/frontend
          cp iagentshub/docker/Dockerfile.unified     build-ctx/Dockerfile
          cp iagentshub/docker/supervisord.conf       build-ctx/supervisord.conf
          cp iagentshub/docker/entrypoint-unified.sh  build-ctx/entrypoint-unified.sh

      - name: Build y push imagen multi-plataforma
        uses: docker/build-push-action@v5
        with:
          context: build-ctx
          platforms: linux/amd64,linux/arm64
          push: true
          tags: iagenthub/app:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
